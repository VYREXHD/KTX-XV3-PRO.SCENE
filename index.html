<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KTX-XV3-PRO.SCENE</title>
    <style>
        :root {
            --primary: #ff4500; /* Pro Red/Orange */
            --bg: #050505;
            --card-bg: #121212;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        header {
            height: 70vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.5), var(--bg)), 
                        url('https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=2071&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            text-align: center;
        }

        .glitch {
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 900;
            color: var(--primary);
            text-shadow: 3px 3px #fff;
            margin: 0;
        }

        .nav-bar {
            background: rgba(18, 18, 18, 0.95);
            backdrop-filter: blur(10px);
            padding: 1.2rem;
            position: sticky;
            top: 0;
            display: flex;
            justify-content: center;
            gap: 40px;
            border-bottom: 1px solid #222;
            z-index: 100;
        }

        .nav-bar a {
            color: #aaa;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .nav-bar a:hover {
            color: var(--primary);
        }

        .container {
            max-width: 1100px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #222;
            transition: 0.3s;
        }

        .stat-card:hover {
            border-color: var(--primary);
            transform: translateY(-5px);
        }

        .ranking-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .ranking-table th {
            text-align: left;
            color: #555;
            padding-bottom: 15px;
        }

        .ranking-table td {
            padding: 15px 0;
            border-top: 1px solid #222;
        }

        .btn {
            background: var(--primary);
            color: white;
            padding: 18px 40px;
            text-decoration: none;
            font-weight: 800;
            border-radius: 4px;
            margin-top: 30px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <header>
        <h1 class="glitch">KTX-XV3</h1>
        <p style="letter-spacing: 5px; opacity: 0.7;">PRO SCENE HUB</p>
        <a href="#" class="btn">JOIN THE ARENA</a>
    </header>

    <div class="nav-bar">
        <a href="#rankings">LEADERBOARD</a>
        <a href="#rules">RULESET</a>
        <a href="#schedule">SCHEDULE</a>
    </div>

    <div class="container">
        <section id="rankings">
            <h2 style="font-size: 2rem;">TOP CONTENDERS</h2>
            <div class="stat-card">
                <table class="ranking-table">
                    <thead>
                        <tr>
                            <th>RANK</th>
                            <th>PLAYER</th>
                            <th>ELO</th>
                            <th>STATUS</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>01</td>
                            <td style="color: var(--primary); font-weight: bold;">VYREXHD</td>
                            <td>2800</td>
                            <td>ONLINE</td>
                        </tr>
                        <tr>
                            <td>02</td>
                            <td>Candidate_A</td>
                            <td>2450</td>
                            <td>OFFLINE</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>

</body>
</html>
