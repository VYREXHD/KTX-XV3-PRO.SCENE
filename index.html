<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KTX | Competitive Hub</title>
    <style>
        :root {
            --primary: #ff4500; 
            --bg: #000000;
            --card-bg: #0d0d0d;
            --text: #ffffff;
            --border: #1a1a1a;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 0;
            scroll-behavior: smooth;
        }

        /* Clean Header */
        header {
            height: 50vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid var(--border);
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        .logo-text {
            font-size: 5rem;
            font-weight: 900;
            letter-spacing: -3px;
            margin: 0;
            text-transform: uppercase;
        }

        .nav-bar {
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            padding: 20px;
            display: flex;
            justify-content: center;
            gap: 40px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-bar a {
            color: #666;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.2s;
        }

        .nav-bar a:hover { color: var(--primary); }

        .container {
            max-width: 1000px;
            margin: 60px auto;
            padding: 0 20px;
        }

        /* Table Styling */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 0;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #050505;
            padding: 20px;
            text-align: left;
            font-size: 0.65rem;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        td {
            padding: 20px;
            border-top: 1px solid var(--border);
            font-size: 0.9rem;
        }

        .rank { color: var(--primary); font-weight: bold; width: 50px; }
        .status { color: #00ff88; font-size: 0.7rem; font-weight: bold; }

        .btn-main {
            background: var(--primary);
            color: white;
            padding: 15px 40px;
            text-decoration: none;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 0.8rem;
            margin-top: 30px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <header>
        <h1 class="logo-text">KTX<span style="color:var(--primary)">.</span></h1>
        <p style="color: #444; font-weight: bold; letter-spacing: 3px;">PRO SCENE HUB</p>
        <a href="#" class="btn-main">Enter Discord</a>
    </header>

    <div class="nav-bar">
        <a href="#leaderboard">Leaderboard</a>
        <a href="#rules">Ruleset</a>
        <a href="#info">Info</a>
    </div>

    <div class="container" id="leaderboard">
        <h2 style="font-size: 0.8rem; color: #444; text-transform: uppercase; margin-bottom: 20px;">Top Contenders</h2>
        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Player</th>
                        <th>Points</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="rank">01</td>
                        <td style="font-weight: bold;">VYREXHD</td>
                        <td>2800</td>
                        <td class="status">ONLINE</td>
                    </tr>
                    <tr>
                        <td class="rank">02</td>
                        <td>CONTENDER_02</td>
                        <td>2450</td>
                        <td style="color: #333; font-size: 0.7rem;">OFFLINE</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>
